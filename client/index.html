              }
            },

              "@type": "Question",
              "name": "O que é asma infantil e como é tratada?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "A asma infantil é a doença crônica respiratória mais comum na infância, caracterizada por inflamação das vias aéreas e episódios de falta de ar, chiado no peito e tosse. O diagnóstico precoce e o tratamento adequado com acompanhamento de um Pneumologista Pediátrico como a Dra. Ana Carolina Pacheco Nekrycz permitem que a criança tenha uma vida plena e ativa, com controle dos sintomas e prevenção de crises graves."
              }
            },

              "acceptedAnswer": {
                "@type": "Answer",
                "text": "A bronquiolite é uma infecção respiratória aguda frequente em bebês menores de 2 anos, geralmente causada pelo Vírus Sincicial Respiratório (VSR). Os sintomas incluem coriza, tosse, chiado e dificuldade para respirar. O acompanhamento com uma Pneumologista Pediátrica especializada é essencial para o manejo correto, prevenção de complicações e orientação aos pais. A Dra. Ana Carolina Pacheco Nekrycz atende casos de bronquiolite no Instituto Emunah em São Paulo."
              }
            },

                "@type": "Answer",
                "text": "A consulta pré-natal pediátrica é recomendada a partir do terceiro trimestre de gestação (após a 28ª semana). Nela, os futuros pais se preparam para a chegada do bebê, tiram dúvidas sobre amamentação, sono seguro, primeiros cuidados, organização do ambiente doméstico e escolha do enxoval. A Dra. Ana Carolina Pacheco Nekrycz oferece esta consulta no Instituto Emunah, em São Paulo."

              "acceptedAnswer": {

                "text": "A introdução alimentar deve começar a partir dos 6 meses de idade completos, conforme recomendação da OMS (Organização Mundial da Saúde) e da Sociedade Brasileira de Pediatria (SBP). O acompanhamento pediátrico especializado é fundamental para garantir uma alimentação diversificada, saudável e segura, prevenindo seletividade alimentar e obesidade infantil."

                "@type": "Answer",
                "text": "Desenvolvimento neuropsicomotor é o processo de aquisição de habilidades motoras (sentar, engatinhar, andar), cognitivas (atenção, memória, aprendizado), de linguagem (balbuciar, falar) e socioemocionais pela criança. O acompanhamento regular com um pediatra permite identificar precocemente qualquer alteração no desenvolvimento e encaminhar para as intervenções adequadas, favorecendo a aprendizagem e a autonomia da criança."
